# Reverse proxy MarkUp: frontend Next.js (PM2, port 3000) + backend Django
# (Gunicorn, port 8000) di satu domain yang sama -- jadi gak perlu CORS lintas
# domain buat pemakaian normal aplikasi.
#
# Ganti "yourdomain.com" di bawah, lalu taruh file ini di
# /etc/nginx/sites-available/markup dan symlink ke sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/markup /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Setelah itu jalanin `sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com`
# -- certbot otomatis nambahin server block HTTPS (443) + redirect HTTP->HTTPS,
# jadi gak perlu ditulis manual di sini.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    client_max_body_size 20M;  # cukup buat upload bukti bayar/CV/sertifikat

    location /static/ {
        alias /var/www/markup/Backend/staticfiles/;
    }

    # Kalau S3_* di .env udah diisi (DomainEsia/R2/dll), folder media lokal
    # ini gak kepake lagi (file baru lari ke object storage) -- location ini
    # cuma fallback buat file lama yang sempat ke-upload sebelum itu aktif.
    location /media/ {
        alias /var/www/markup/Backend/media/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin bawaan Django (bukan dashboard admin custom -- itu di /admin
    # lewat frontend Next.js, location / di bawah).
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
