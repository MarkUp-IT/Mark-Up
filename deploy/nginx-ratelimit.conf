# Definisi zona rate-limit MarkUp -- HARUS di http block. Salin ke conf.d:
#   sudo cp deploy/nginx-ratelimit.conf /etc/nginx/conf.d/markup-ratelimit.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Dipakai di server block (deploy/nginx.conf): limit_req zone=markup_api ...
# dan limit_conn markup_conn ...

# Throttle request dinamis /api/ & /django-admin/ per IP. 10 req/detik dengan
# burst 20 -- longgar buat pemakaian normal, tapi ngerem flood.
limit_req_zone $binary_remote_addr zone=markup_api:10m rate=10r/s;

# Batasi jumlah koneksi TCP bareng per IP (connection-flood defense).
limit_conn_zone $binary_remote_addr zone=markup_conn:10m;

# Balikin 429 (Too Many Requests), bukan 503 default, biar client tau ini
# throttling, bukan server down.
limit_req_status 429;
limit_conn_status 429;
